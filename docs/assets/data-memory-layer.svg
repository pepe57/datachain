    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- AI Agents container (LEFT, orange dashed) -->
<rect x="40" y="60" width="240" height="320" rx="12" fill="rgba(153,60,29,0.04)" stroke="rgb(153,60,29)" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="160" y="92" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="rgb(113,43,19)">AI Agents</text>

<!-- Claude Code chip -->
<g>
  <rect x="60" y="124" width="200" height="60" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="160" y="154" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(113,43,19)">Claude Code</text>
</g>

<!-- Cursor chip -->
<g>
  <rect x="60" y="204" width="200" height="60" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="160" y="234" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(113,43,19)">Cursor</text>
</g>

<!-- Codex chip -->
<g>
  <rect x="60" y="284" width="200" height="60" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="160" y="314" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(113,43,19)">Codex</text>
</g>

<!-- DataChain · Memory Layer container (CENTER, blue dashed) -->
<rect x="380" y="60" width="320" height="320" rx="12" fill="rgba(24,95,165,0.04)" stroke="rgb(24,95,165)" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="540" y="92" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="15" font-weight="600" fill="rgb(12,68,124)">DataChain · Memory Layer</text>

<!-- Knowledge Base tier (amber, top — closest to agents) -->
<g>
  <rect x="400" y="124" width="280" height="60" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="540" y="146" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="rgb(99,56,6)">Knowledge Base</text>
  <text x="540" y="166" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" fill="rgb(133,79,11)">schema · code · LLM summaries</text>
</g>

<!-- Data Memory tier (green, middle) -->
<g>
  <rect x="400" y="204" width="280" height="60" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="540" y="226" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="rgb(8,80,65)">Data Memory</text>
