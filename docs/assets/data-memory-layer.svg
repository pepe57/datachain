<!-- GCS chip -->
<g>
  <rect x="820" y="204" width="200" height="60" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="920" y="234" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(68,68,65)">GCS</text>
</g>

<!-- Azure chip -->
<g>
  <rect x="820" y="284" width="200" height="60" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="920" y="314" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="rgb(68,68,65)">Azure</text>
</g>

<!-- Bidirectional arrows: Agents <-> DataChain -->
<line x1="292" y1="213" x2="378" y2="213" stroke="rgb(95,94,90)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="378" y1="227" x2="292" y2="227" stroke="rgb(95,94,90)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="335" y="201" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-style="italic" fill="rgb(95,94,90)">Skill · MCP</text>

<!-- Bidirectional arrows: DataChain <-> Storage -->
<line x1="712" y1="213" x2="798" y2="213" stroke="rgb(95,94,90)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="798" y1="227" x2="712" y2="227" stroke="rgb(95,94,90)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="755" y="201" text-anchor="middle" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-style="italic" fill="rgb(95,94,90)">raw files</text>

