  <text x="540" y="326" text-anchor="middle" dominant-baseline="central" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" fill="rgb(24,95,165)">parallel · async · checkpoint recovery</text>
</g>

<!-- Object Storage container (RIGHT, gray dashed) -->
<rect x="800" y="60" width="240" height="320" rx="12" fill="rgba(95,94,90,0.04)" stroke="rgb(95,94,90)" stroke-width="1.5" stroke-dasharray="6 4"/>
